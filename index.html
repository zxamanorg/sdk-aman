<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aman</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:black;
color:white;
overflow:hidden;
text-align:center;
}

/* Stars background */

.stars{
position:absolute;
width:100%;
height:100%;
background:transparent url("https://www.transparenttextures.com/patterns/stardust.png") repeat;
animation:moveStars 100s linear infinite;
z-index:-1;
}

@keyframes moveStars{
from{background-position:0 0;}
to{background-position:10000px 5000px;}
}

/* Container */

.container{
padding:60px;
background:rgba(0,0,0,0.6);
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 0 40px rgba(0,255,255,0.3);
}

/* Typing text */

.typing{
font-size:80px;
white-space:nowrap;
overflow:hidden;
border-right:4px solid cyan;
width:0;
animation:typing 3s steps(5,end) forwards, blink 0.8s infinite;
}

@keyframes typing{
from{width:0}
to{width:5ch}
}

@keyframes blink{
50%{border-color:transparent}
}

/* Text */

p{
font-size:22px;
margin-top:15px;
}

/* Mobile */

@media(max-width:600px){
.typing{
font-size:50px;
}

p{
font-size:18px;
}

.container{
padding:40px;
}
}

</style>

</head>

<body>

<div class="stars"></div>

<div class="container">

<h1 class="typing">AMAN</h1>

<p>CEO = AURANODE</p>
<p>FOUNDER = CUBIX CLOUD</p>

</div>

</body>
</html>
