<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMAN LOGIN</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* particles background */
#particles-js{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

/* login box */
.box{
background:rgba(0,0,0,0.7);
padding:40px;
border-radius:10px;
text-align:center;
box-shadow:0 0 20px cyan;
}

/* animated logo */
.logo{
font-size:60px;
color:cyan;
text-shadow:0 0 20px cyan;
animation:spin 6s linear infinite;
}

@keyframes spin{
0%{transform:rotateY(0deg)}
100%{transform:rotateY(360deg)}
}

input{
width:200px;
padding:10px;
margin:10px;
border:none;
border-radius:5px;
}

button{
padding:10px 20px;
background:cyan;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div id="particles-js"></div>

<div class="box">

<div class="logo">AMAN</div>

<br>

<input type="text" placeholder="Username"><br>
<input type="password" placeholder="Password"><br>

<button onclick="login()">LOGIN</button>

<br><br>

<button onclick="toggleMusic()">🎵 Music</button>

</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8f3a1f3f3.mp3">
</audio>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script>

/* particles */

particlesJS("particles-js",{
particles:{
number:{value:80},
size:{value:3},
move:{speed:2},
line_linked:{enable:true}
}
});

/* login */

function login(){
alert("Login system demo");
}

/* music */

function toggleMusic(){
var m=document.getElementById("music");
if(m.paused){
m.play();
}else{
m.pause();
}
}

</script>

</body>
</html>
