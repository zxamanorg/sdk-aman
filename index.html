<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMAN</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:#0ff;
text-align:center;
}

h1{
font-size:70px;
margin-top:60px;
text-shadow:0 0 20px cyan;
}

.card{
width:300px;
margin:20px auto;
padding:20px;
border:1px solid cyan;
border-radius:10px;
background:rgba(0,0,0,0.7);
}

button{
padding:10px 20px;
background:cyan;
border:none;
cursor:pointer;
font-weight:bold;
}

</style>
</head>

<body>

<h1>AMAN</h1>

<div class="card">
CEO = AURANODE
</div>

<div class="card">
FOUNDER = CUBIX CLOUD
</div>

<div class="card">
🌐 Visitors: <span id="visits">0</span>
</div>

<div class="card">
📊 Gaming Server Status
<br><br>
Status: <span style="color:lime">ONLINE</span>
</div>

<div class="card">
<button onclick="openChat()">🧠 AI CHATBOT</button>
</div>

<script>

/* simple visitor counter */

if(localStorage.visits){
localStorage.visits = Number(localStorage.visits)+1;
}else{
localStorage.visits = 1;
}

document.getElementById("visits").innerText = localStorage.visits;

/* AI button */

function openChat(){
window.open("https://chat.openai.com","_blank");
}

</script>

</body>
</html>
