<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HDX Panel</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ffff;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.container{
    border:2px solid #00ffff;
    width:90%;
    max-width:500px;
    padding:20px;
    box-shadow:0 0 20px #00ffff;
    text-align:center;
}

/* Animation overlay */
.transition{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#00ffff;
    transform:scaleX(0);
    transform-origin:left;
    transition:0.5s;
}

.transition.active{
    transform:scaleX(1);
}

button{
    margin-top:30px;
    background:black;
    border:1px solid #00ffff;
    color:#00ffff;
    padding:12px 25px;
    cursor:pointer;
    font-size:18px;
}

button:hover{
    background:#00ffff;
    color:black;
}
</style>
</head>

<body>

<div class="transition" id="transition"></div>

<div class="container">
    <h1>WELCOME TO H.D.X</h1>
    <button onclick="goNext()">➡</button>
</div>

<script>
function goNext(){
    let t = document.getElementById("transition");
    t.classList.add("active");

    setTimeout(()=>{
        window.location.href = "page2.html";
    },500);
}
</script>

</body>
</html>
