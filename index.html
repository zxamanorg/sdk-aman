<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMAN</title>

<style>

body{
margin:0;
font-family:monospace;
background:black;
color:#0ff;
overflow:hidden;
}

/* Galaxy background */

#particles-js{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

/* Terminal intro */

#terminal{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
font-size:22px;
white-space:pre;
}

.hidden{
display:none;
}

/* Main dashboard */

#main{
display:none;
text-align:center;
padding-top:120px;
}

.logo{
font-size:80px;
color:#0ff;
text-shadow:0 0 20px #0ff,0 0 40px #0ff;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 20px #0ff }
to{ text-shadow:0 0 40px #0ff }
}

.card{
margin:20px auto;
width:250px;
padding:20px;
border:1px solid #0ff;
border-radius:10px;
background:rgba(0,0,0,0.6);
}

button{
margin-top:20px;
padding:10px 20px;
background:#0ff;
border:none;
cursor:pointer;
font-weight:bold;
}

</style>

</head>

<body>

<div id="particles-js"></div>

<div id="terminal"></div>

<div id="main">

<h1 class="logo">AMAN</h1>

<div class="card">CEO = AURANODE</div>
<div class="card">FOUNDER = CUBIX CLOUD</div>

<button onclick="openChat()">🧠 AI CHAT</button>

</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script>

/* Galaxy particles */

particlesJS("particles-js",{
particles:{
number:{value:100},
size:{value:3},
move:{speed:1},
line_linked:{enable:true}
}
});

/* Terminal animation */

const text=[
"Booting system...",
"Access granted...",
"Loading profile...",
"Welcome Aman"
];

let i=0;
let j=0;
let current="";
let speed=50;

function type(){
if(i<text.length){
if(j<text[i].length){
current+=text[i].charAt(j);
document.getElementById("terminal").innerText=current;
j++;
setTimeout(type,speed);
}
else{
current+="\n";
i++;
j=0;
setTimeout(type,500);
}
}
else{
document.getElementById("terminal").classList.add("hidden");
document.getElementById("main").style.display="block";
}
}

type();

/* AI button */

function openChat(){
window.open("https://chat.openai.com","_blank");
}

</script>

</body>
</html>
