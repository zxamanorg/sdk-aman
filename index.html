<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HDX Login</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:black;
    color:#00ffff;
    font-family:'Orbitron', sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

/* PARTICLES */
#particles{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
}

/* BOX */
.container{
    border:2px solid #00ffff;
    width:90%;
    max-width:400px;
    padding:20px;
    box-shadow:0 0 25px #00ffff;
    position:relative;
    text-align:center;
}

/* TOP INFO */
.top{
    position:absolute;
    left:10px;
    top:10px;
    font-size:12px;
}

/* SIGNUP */
.signup{
    position:absolute;
    right:10px;
    top:10px;
    cursor:pointer;
    font-size:12px;
}

/* INPUT */
input{
    width:90%;
    padding:10px;
    margin:15px 0;
    background:black;
    border:1px solid #00ffff;
    color:#00ffff;
}

/* BUTTON */
button{
    padding:10px 25px;
    background:black;
    border:1px solid #00ffff;
    color:#00ffff;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#00ffff;
    color:black;
    transform:scale(1.1);
}

/* TRANSITION */
.transition{
    position:fixed;
    width:100%;
    height:100%;
    background:#00ffff;
    transform:scaleX(0);
    transform-origin:left;
    transition:0.5s;
}

.transition.active{
    transform:scaleX(1);
}

/* ERROR */
.error{
    color:red;
    font-size:12px;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>
<div class="transition" id="transition"></div>

<div class="container">

    <!-- TOP LEFT -->
    <div class="top">
        FPS: <span id="fps">0</span><br>
        Ping: <span id="ping">--</span>
    </div>

    <!-- SIGNUP -->
    <div class="signup" onclick="comingSoon()">Sign Up</div>

    <h2>HDX LOGIN</h2>

    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">

    <button onclick="login()">➡</button>

    <div class="error" id="error"></div>

</div>

<script>
// LOGIN
function login(){
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(u === "HDX" && p === "788"){
        let t = document.getElementById("transition");
        t.classList.add("active");

        setTimeout(()=>{
            window.location.href = "home.html";
        },500);
    }else{
        document.getElementById("error").innerText = "Wrong ID ❌";
    }
}

// SIGNUP
function comingSoon(){
    alert("Coming Soon 🚀");
}

// PING
setInterval(()=>{
    document.getElementById("ping").innerText = Math.floor(Math.random()*80+20)+" ms";
},1000);

// FPS
let last = performance.now();
function fpsCounter(){
    let now = performance.now();
    let fps = Math.round(1000/(now-last));
    last = now;

    if(fps > 360) fps = 360;
    document.getElementById("fps").innerText = fps;

    requestAnimationFrame(fpsCounter);
}
fpsCounter();

// PARTICLES (same as 1st page)
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<70;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        size:Math.random()*2,
        speedX:(Math.random()-0.5),
        speedY:(Math.random()-0.5)
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="#00ffff";

    particles.forEach(p=>{
        p.x += p.speedX;
        p.y += p.speedY;

        if(p.x<0||p.x>canvas.width) p.speedX*=-1;
        if(p.y<0||p.y>canvas.height) p.speedY*=-1;

        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fill();
    });

    requestAnimationFrame(animate);
}
animate();

window.addEventListener("resize",()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
