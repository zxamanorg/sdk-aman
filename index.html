<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMAN</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* Particle canvas */

#particles-js{
position:absolute;
width:100%;
height:100%;
z-index:-1;
}

/* Container */

.container{
text-align:center;
}

/* 3D rotating text */

.logo{
font-size:80px;
color:#0ff;
text-shadow:
0 0 10px #0ff,
0 0 20px #0ff,
0 0 40px #0ff;
animation:rotate 6s linear infinite;
}

@keyframes rotate{
0%{transform:rotateY(0deg)}
100%{transform:rotateY(360deg)}
}

p{
font-size:20px;
margin-top:10px;
}

/* Button */

button{
margin-top:20px;
padding:10px 20px;
background:#0ff;
border:none;
color:black;
font-weight:bold;
cursor:pointer;
border-radius:6px;
}

</style>

</head>

<body>

<div id="particles-js"></div>

<div class="container">

<h1 class="logo">AMAN</h1>

<p>CEO = AURANODE</p>
<p>FOUNDER = CUBIX CLOUD</p>

<button onclick="toggleMusic()">🔊 Toggle Music</button>

</div>

<audio id="bgmusic" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8f3a1f3f3.mp3" type="audio/mpeg">
</audio>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script>

particlesJS("particles-js", {
particles:{
number:{value:80},
size:{value:3},
move:{speed:2},
line_linked:{enable:true}
}
});

function toggleMusic(){
var music=document.getElementById("bgmusic");
if(music.paused){
music.play();
}else{
music.pause();
}
}

</script>

</body>
</html>
