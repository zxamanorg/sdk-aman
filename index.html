<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMAN SYSTEM</title>

<style>

body{
margin:0;
font-family:monospace;
background:black;
color:#00ffff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
overflow:hidden;
}

/* particles background */

#particles-js{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

/* loading box */

.box{
padding:40px;
background:rgba(0,0,0,0.7);
border:1px solid cyan;
box-shadow:0 0 20px cyan;
}

/* typing animation */

.loading{
font-size:32px;
border-right:3px solid cyan;
white-space:nowrap;
overflow:hidden;
width:0;
animation:typing 4s steps(22,end) forwards, blink .8s infinite;
}

@keyframes typing{
from{width:0}
to{width:22ch}
}

@keyframes blink{
50%{border-color:transparent}
}

.dev{
margin-top:20px;
font-size:18px;
color:white;
}

</style>

</head>

<body>

<div id="particles-js"></div>

<div class="box">

<div class="loading">
SYSTEM REBOOT LOADING...
</div>

<div class="dev">
Developer = AMAN
</div>

</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script>

/* galaxy particles */

particlesJS("particles-js",{
particles:{
number:{value:80},
size:{value:3},
move:{speed:2},
line_linked:{enable:true}
}
});

</script>

</body>
</html>
