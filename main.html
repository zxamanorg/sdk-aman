<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AMAN</title>

<style>

body{

margin:0;

background:black;

color:white;

font-family:Arial;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

text-align:center;

}

/* 3D logo */

.logo{

font-size:100px;

color:cyan;

animation:rotate 6s infinite linear;

text-shadow:

0 0 20px cyan,

0 0 40px cyan,

0 0 80px cyan;

}

@keyframes rotate{

0%{

transform:rotateY(0deg);

}

100%{

transform:rotateY(360deg);

}

}

.text{

font-size:24px;

margin-top:20px;

}

</style>
</head>

<body>

<div>

<div class="logo">

AMAN

</div>

<div class="text">

CEO = AURANODE

</div>

<div class="text">

FOUNDER = ICLOUD HOSTING

</div>

</div>

</body>
</html>
