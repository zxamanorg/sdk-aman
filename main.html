<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AMAN</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
overflow:hidden;
}

#particles-js{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

.logo{

font-size:90px;
color:cyan;

text-shadow:
0 0 10px cyan,
0 0 30px cyan,
0 0 60px cyan;

animation:glow 2s infinite alternate;

}

@keyframes glow{

from{
text-shadow:0 0 10px cyan;
}

to{
text-shadow:0 0 50px cyan;
}

}

.text{

margin-top:20px;
font-size:22px;
letter-spacing:2px;

}

</style>
</head>

<body>

<div id="particles-js"></div>

<div>

<div class="logo">
AMAN
</div>

<div class="text">
CEO = AURANODE
</div>

<div class="text">
FOUNDER = ICLOUD HOSTING
</div>

</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script>

particlesJS("particles-js",{
particles:{
number:{value:80},
size:{value:3},
move:{speed:2},
line_linked:{enable:true}
}
});

</script>

</body>
</html>
