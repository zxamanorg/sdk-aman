<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AMAN</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:black;
color:white;
font-family:'Orbitron',sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
overflow:hidden;
}

/* particles background */

#particles-js{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

/* logo */

.logo{

font-size:110px;

color:cyan;

text-shadow:

0 0 20px cyan,

0 0 40px cyan,

0 0 80px cyan,

0 0 120px cyan;

animation:rotate 8s linear infinite;

}

/* rotation */

@keyframes rotate{

0%{
transform:rotateY(0deg);
}

100%{
transform:rotateY(360deg);
}

}

/* text */

.text{

font-size:26px;

margin-top:20px;

letter-spacing:2px;

}

</style>

</head>

<body>

<div id="particles-js"></div>

<div>

<div class="logo">
AMAN
</div>

<div class="text">
CEO = AURANODE
</div>

<div class="text">
FOUNDER = ICLOUD HOSTING
</div>

</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script>

particlesJS("particles-js",{
particles:{
number:{value:100},
size:{value:3},
move:{speed:1},
line_linked:{enable:true}
}
});

</script
