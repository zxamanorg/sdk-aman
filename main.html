<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AMAN</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
overflow:hidden;
}

/* ping */

#ping{
position:absolute;
top:10px;
left:10px;
font-size:18px;
}

/* logo */

.logo{
font-size:90px;
color:cyan;

text-shadow:
0 0 20px cyan,
0 0 40px cyan;

animation:spin 8s linear infinite;
}

@keyframes spin{
0%{transform:rotateY(0deg)}
100%{transform:rotateY(360deg)}
}

/* info */

.info{
font-size:22px;
margin-top:15px;
}

</style>

</head>

<body>

<div id="ping">
Ping: <span id="pingvalue">...</span> ms
</div>

<div>

<div class="logo">
WELCOME VIEWER
</div>

<div class="info">
Age = 15 (soon)
</div>

<div class="info">
Class = IX
</div>

<div class="info">
Complete = C#, C++, JAVA
</div>

<div class="info">
Pending = PYTHON
</div>

</div>

<script>

/* ping */

function ping(){

let start=Date.now();

fetch(window.location.href,{method:"HEAD"}).then(()=>{

let p=Date.now()-start;

document.getElementById("pingvalue").innerText=p;

});

}

setInterval(ping,2000);

ping();

</script>

</body>

</html>
