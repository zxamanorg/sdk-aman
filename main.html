<!-- RIGHT SIDE ANALYTICS PANEL -->

<div id="analytics">

<div>🌍 Country: <span id="country">Loading...</span></div>

<div>📍 City: <span id="city">Loading...</span></div>

<div>📡 IP: <span id="ip">Loading...</span></div>

<div>📊 Visitors: <span id="visitors">Loading...</span></div>

</div>

<style>

#analytics{
position:absolute;
top:10px;
right:10px;
padding:12px;
font-size:14px;
background:rgba(0,0,0,0.7);
border-left:2px solid cyan;
border-top:2px solid cyan;
line-height:22px;
}

</style>

<script>

/* IP + location */

fetch("https://ipapi.co/json/")
.then(res=>res.json())
.then(data=>{

document.getElementById("country").innerText=data.country_name;
document.getElementById("city").innerText=data.city;
document.getElementById("ip").innerText=data.ip;

});

/* simple visitor counter */

let count=localStorage.getItem("visitcount");

if(!count){

count=1;

}else{

count=parseInt(count)+1;

}

localStorage.setItem("visitcount",count);

document.getElementById("visitors").innerText=count;

</script>
