
<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMAN</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:black;
color:white;
font-family:'Share Tech Mono', monospace;
overflow-y:auto;
}

/* Parallax galaxy background */
#stars{
position:fixed;
width:100%;
height:100%;
background:url("https://raw.githubusercontent.com/VincentGarreau/particles.js/master/demo/media/star.png");
background-size:3px;
z-index:-1;
}

/* intro glitch */
#intro{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:10;
}
.glitch{
font-size:70px;
color:white;
animation:glitch 1s infinite;
}
@keyframes glitch{
0%{text-shadow:2px 2px red;}
25%{text-shadow:-2px -2px cyan;}
50%{text-shadow:2px -2px red;}
75%{text-shadow:-2px 2px cyan;}
100%{text-shadow:2px 2px red;}
}

/* ping */
#ping{
position:absolute;
top:10px;
left:10px;
font-size:18px;
}

/* analytics */
#analytics{
position:absolute;
top:10px;
right:10px;
padding:12px;
font-size:14px;
background:rgba(0,0,0,0.7);
border-left:2px solid cyan;
border-top:2px solid cyan;
line-height:22px;
}

/* main content */
#main{
display:none;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
padding-top:100px;
}

/* welcome */
.welcome{
font-size:70px;
margin-bottom:30px;
color:cyan;
text-shadow:0 0 20px cyan,0 0 40px cyan;
transition:0.3s;
}

/* AMAN logo */
.logo{
font-size:95px;
margin-bottom:25px;
color:white;
text-shadow:0 0 20px white,0 0 40px cyan;
animation:spin 8s linear infinite;
transition:0.3s;
}
@keyframes spin{
0%{transform:rotateY(0deg)}
100%{transform:rotateY(360deg)}
}

/* info */
.info{
font-size:24px;
margin-top:10px;
transition:0.3s;
}

/* hover glow */
.welcome:hover,
.logo:hover,
.info:hover{
color:cyan;
text-shadow:0 0 10px cyan,0 0 20px cyan,0 0 40px cyan,0 0 80px cyan;
}
</style>
</head>

<body>

<!-- stars background -->
<div id="stars"></div>

<!-- intro -->
<div id="intro">
<div class="glitch">SYSTEM OPENING...</div>
<p>Loading Aman Interface</p>
</div>

<!-- ping -->
<div id="ping">
Ping: <span id="pingvalue">...</span> ms
</div>

<!-- analytics -->
<div id="analytics">
<div>🌍 Country: <span id="country">Loading...</span></div>
<div>📍 City: <span id="city">Loading...</span></div>
<div>📡 IP: <span id="ip">Loading...</span></div>
<div>📊 Visits: <span id="visits">Loading...</span></div>
</div>

<!-- main content -->
<div id="main">
<div class="welcome">WELCOME VIEWER</div>
<div class="logo">AMAN</div>
<div class="info">Age = 15 (soon)</div>
<div class="info">Class = IX</div>
<div class="info">Complete = C#, C++, JAVA</div>
<div class="info">Pending = PYTHON</div>
</div>

<script>
/* intro delay */
setTimeout(()=>{
document.getElementById("intro").style.display="none";
document.getElementById("main").style.display="flex";
},3000);

/* ping */
function ping(){
let start=Date.now();
fetch(window.location.href,{method:"HEAD"}).then(()=>{
let p=Date.now()-start;
document.getElementById("pingvalue").innerText=p;
});
}
setInterval(ping,2000);
ping();

/* location */
fetch("https://ipapi.co/json/")
.then(res=>res.json())
.then(data=>{
document.getElementById("country").innerText=data.country_name;
document.getElementById("city").innerText=data.city;
document.getElementById("ip").innerText=data.ip;
});

/* visits */
let visits=localStorage.getItem("visits");
if(!visits){ visits=1; }else{ visits=parseInt(visits)+1; }
localStorage.setItem("visits",visits);
document.getElementById("visits").innerText=visits;

/* parallax stars */
document.addEventListener("mousemove",function(e){
let x=e.clientX/window.innerWidth;
let y=e.clientY/window.innerHeight;
document.getElementById("stars").style.transform="translate("+x*20+"px,"+y*20+"px)";
});
</script>

</body>
</html>
```
