<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AMAN</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:black;
color:white;
font-family:'Share Tech Mono', monospace;
overflow:hidden;
}

/* intro glitch */

#intro{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:10;
}

.glitch{
font-size:70px;
color:white;
animation:glitch 1s infinite;
}

@keyframes glitch{

0%{text-shadow:2px 2px red;}

25%{text-shadow:-2px -2px cyan;}

50%{text-shadow:2px -2px red;}

75%{text-shadow:-2px 2px cyan;}

100%{text-shadow:2px 2px red;}

}

/* ping */

#ping{
position:absolute;
top:10px;
left:10px;
font-size:18px;
}

/* analytics */

#analytics{
position:absolute;
top:10px;
right:10px;
padding:12px;
font-size:14px;
background:rgba(0,0,0,0.7);
border-left:2px solid cyan;
border-top:2px solid cyan;
line-height:22px;
}

/* main */

#main{
display:none;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

/* welcome */

.welcome{
font-size:70px;
color:cyan;
margin-bottom:20px;
text-shadow:
0 0 20px cyan,
0 0 40px cyan;
}

/* aman */

.logo{
font-size:95px;
margin-bottom:25px;

color:white;

text-shadow:
0 0 20px white,
0 0 40px cyan;

animation:spin 8s linear infinite;
}

@keyframes spin{

0%{transform:rotateY(0deg)}

100%{transform:rotateY(360deg)}

}

/* info */

.info{
font-size:24px;
margin-top:8px;
}

</style>

</head>

<body>

<!-- intro -->

<div id="intro">

<div class="glitch">
SYSTEM OPENING...
</div>

<p>Loading Aman Interface</p>

</div>

<!-- ping -->

<div id="ping">
Ping: <span id="pingvalue">...</span> ms
</div>

<!-- analytics -->

<div id="analytics">

<div>🌍 Country: <span id="country">Loading...</span></div>

<div>📍 City: <span id="city">Loading...</span></div>

<div>📡 IP: <span id="ip">Loading...</span></div>

<div>📊 Visits: <span id="visits">Loading...</span></div>

</div>

<!-- main content -->

<div id="main">

<div class="welcome">
WELCOME VIEWER
</div>

<div class="logo">
AMAN
</div>

<div class="info">
Age = 15 (soon)
</div>

<div class="info">
Class = IX
</div>

<div class="info">
Complete = C#, C++, JAVA
</div>

<div class="info">
Pending = PYTHON
</div>

</div>

<script>

/* intro delay */

setTimeout(()=>{

document.getElementById("intro").style.display="none";

document.getElementById("main").style.display="flex";

},3000);

/* ping */

function ping(){

let start=Date.now();

fetch(window.location.href,{method:"HEAD"}).then(()=>{

let p=Date.now()-start;

document.getElementById("pingvalue").innerText=p;

});

}

setInterval(ping,2000);

ping();

/* location */

fetch("https://ipapi.co/json/")
.then(res=>res.json())
.then(data=>{

document.getElementById("country").innerText=data.country_name;

document.getElementById("city").innerText=data.city;

document.getElementById("ip").innerText=data.ip;

});

/* visits */

let visits=localStorage.getItem("visits");

if(!visits){

visits=1;

}else{

visits=parseInt(visits)+1;

}

localStorage.setItem("visits",visits);

document.getElementById("visits").innerText=visits;

</script>

</body>

</html>
